<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Edit your document collaboratively in real-time.">
    <title>Editor — Collaborative Notes</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📝</text></svg>">
</head>

<body>
    <div class="editor-page">
        <!-- Navbar -->
        <nav class="navbar">
            <div class="navbar-brand">
                <button class="btn btn-ghost btn-sm" id="back-btn">← Back</button>
                <div class="logo-icon">📝</div>
                <span>Collaborative Notes</span>
            </div>
            <div class="navbar-actions">
                <div class="active-users-bar">
                    <span class="active-users-label">Online:</span>
                    <div class="active-users-list" id="active-users-list"></div>
                </div>
                <div class="user-badge">
                    <div class="avatar" id="user-avatar-letter">U</div>
                    <span id="user-display-name">User</span>
                </div>
                <button class="btn btn-ghost btn-sm" id="logout-btn">Sign Out</button>
            </div>
        </nav>

        <!-- Toolbar -->
        <div class="editor-toolbar">
            <div style="display: flex; align-items: center; gap: 12px; flex: 1;">
                <input type="text" class="editor-doc-title" id="editor-doc-title" placeholder="Untitled Document">
                <div class="save-status" id="connection-status">
                    <span class="dot"></span>
                    <span class="status-text">Connecting...</span>
                </div>
            </div>
            <div style="display: flex; gap: 8px; align-items: center;">
                <div class="cursor-color-wrapper" title="Choose your cursor color">
                    <div class="cursor-color-swatch" id="cursor-color-swatch"></div>
                    <input type="color" id="cursor-color-picker" class="cursor-color-input" value="#7c6cf0">
                </div>
                <button class="btn btn-secondary btn-sm" id="export-pdf-btn">Export PDF</button>
                <button class="btn btn-secondary btn-sm" id="share-btn">Share</button>
                <button class="btn btn-primary btn-sm" id="save-btn">Save</button>
            </div>
        </div>

        <!-- Typing Indicators -->
        <div class="typing-indicators" id="typing-indicators"></div>

        <!-- Editor -->
        <div class="editor-container">
            <textarea class="editor-area" id="editor-area"
                placeholder="Start typing your notes here...&#10;&#10;💡 Tip: Press Ctrl+S to save. Share this document with others to collaborate in real-time!"></textarea>
        </div>
    </div>

    <!-- Share Modal -->
    <div class="modal-overlay" id="share-modal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">🔗 Share Document</h3>
                <button class="modal-close" id="close-share-modal">&times;</button>
            </div>
            <p class="text-secondary" style="margin-bottom: 16px;">
                Sharing: <strong id="share-doc-title"></strong>
            </p>
            <form id="share-form">
                <div class="form-group">
                    <label class="form-label" for="share-username-input">Username to share with</label>
                    <div style="display: flex; gap: 8px;">
                        <input type="text" class="form-input" id="share-username-input" placeholder="Enter username"
                            required style="flex: 1;">
                        <select class="form-input" id="share-permission-select" style="width: auto; min-width: 130px;">
                            <option value="edit">✏️ Can Edit</option>
                            <option value="view">👁️ View Only</option>
                        </select>
                        <button type="submit" class="btn btn-primary">Share</button>
                    </div>
                </div>
            </form>
            <div class="share-user-list" id="shared-users-list"></div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <script src="/static/js/api.js"></script>
    <script src="/static/js/editor.js"></script>
</body>

</html>
