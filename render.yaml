services:
  - type: web
    name: collaborative-notes
    runtime: python
    plan: free
    region: oregon

    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: cd backend && gunicorn main:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120 --workers 2

    healthCheckPath: /health
    autoDeploy: true

    envVars:
      - key: SECRET_KEY
        generateValue: true

      - key: DATABASE_URL
        sync: false

      # Full CA certificate content from Aiven
      - key: MYSQL_SSL_CA
        sync: false

      - key: PYTHON_VERSION
        value: "3.11.6"

      - key: ALLOWED_ORIGINS
        value: "*"