services:
  - type: web
    name: collaborative-notes
    runtime: python
    plan: free
    region: oregon

    # ── Build & Start ────────────────────────────────────────────────
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: cd backend && gunicorn main:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120 --workers 2 --graceful-timeout 30

    # ── Health Check ─────────────────────────────────────────────────
    healthCheckPath: /health

    # ── Auto-Deploy on push ──────────────────────────────────────────
    autoDeploy: true

    # ── Environment Variables ────────────────────────────────────────
    envVars:
      # JWT secret — auto-generated by Render (unique per deploy)
      - key: SECRET_KEY
        generateValue: true

      # Aiven MySQL connection string
      # Paste the full URI from Aiven Console → Service → Overview → Connection information
      # Example: mysql://avnadmin:PASSWORD@mysql-xxx.aivencloud.com:12345/defaultdb
      - key: DATABASE_URL
        sync: false

      # Path to Aiven CA certificate — written by build.sh
      - key: MYSQL_SSL_CA
        value: "/etc/ssl/certs/aiven-ca.pem"

      # Paste the CA certificate content from Aiven Console → Overview → CA Certificate
      # (the full PEM text including BEGIN/END lines)
      - key: AIVEN_CA_CERT
        sync: false

      - key: PYTHON_VERSION
        value: "3.11.6"

      # Set allowed frontend origins (comma-separated) or * for all
      - key: ALLOWED_ORIGINS
        value: "*"

      # Port is injected by Render automatically, but declare it for clarity
      - key: PORT
        value: "10000"
